<div class="p-8">
  <h1 class="text-4xl font-bold mb-8">Your Cards</h1>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    @for (card of cards; track card.id) {
      <div class="bg-white shadow-xl p-8 rounded-3xl">
        <div class="flex justify-between">
          <p class="text-2xl font-semibold">{{ card.name }}</p>
          <button (click)="deleteCard(card.id)" class="text-red-500">🗑️</button>
        </div>
        <p class="text-6xl font-bold mt-8">${{ card.balance | number:'1.2-2' }}</p>
      </div>
    }
  </div>

  <!-- Add new card -->
  <div class="mt-16 bg-gray-50 p-8 rounded-3xl">
    <h2 class="text-2xl font-semibold mb-6">Add New Card</h2>
    <div class="flex gap-6">
      <input [(ngModel)]="newCard.name" placeholder="Card name (e.g. Visa •••• 4242)"
             class="flex-1 px-6 py-5 border rounded-3xl">
      <input [(ngModel)]="newCard.balance" type="number" placeholder="Initial balance"
             class="flex-1 px-6 py-5 border rounded-3xl">
      <button (click)="addCard()"
              class="px-10 bg-black text-white rounded-3xl text-lg font-medium">
        Add Card
      </button>
    </div>
  </div>

  @if (errorMessage) {
    <div class="mt-6 bg-red-100 p-4 rounded-2xl text-red-700">{{ errorMessage }}</div>
  }
</div>
