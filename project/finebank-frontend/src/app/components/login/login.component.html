<div class="min-h-screen bg-gradient-to-br from-blue-600 to-purple-700 flex items-center justify-center">
  <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md">
    <h1 class="text-4xl font-bold text-center mb-2">FineBank.io</h1>
    <p class="text-center text-gray-500 mb-8">Manage your money smarter</p>

    <form (ngSubmit)="onLogin()">
      <div class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-1">Username</label>
          <input [(ngModel)]="credentials.username" name="username"
                 type="text" required
                 class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input [(ngModel)]="credentials.password" name="password"
                 type="password" required
                 class="w-full px-5 py-4 border border-gray-300 rounded-3xl focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        @if (errorMessage) {
          <div class="bg-red-100 border border-red-500 text-red-700 px-5 py-3 rounded-2xl text-sm">
            {{ errorMessage }}
          </div>
        }

        <button type="submit"
                [disabled]="isLoading"
                class="w-full bg-black text-white py-5 rounded-3xl text-xl font-semibold hover:bg-gray-900 transition">
          {{ isLoading ? 'Logging in...' : 'Login' }}
        </button>
      </div>
    </form>

    <p class="text-center text-xs text-gray-400 mt-8">
      Demo credentials: admin / admin123
    </p>
  </div>
</div>
