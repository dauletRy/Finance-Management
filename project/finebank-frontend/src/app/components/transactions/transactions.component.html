<div class="p-8">
  <h1 class="text-4xl font-bold mb-8">All Transactions</h1>

  <input [(ngModel)]="searchTerm" (input)="filter()"
         placeholder="Search transactions..." 
         class="w-full p-5 border rounded-3xl mb-8 text-lg">

  <div class="space-y-4">
    @for (t of filteredTransactions; track t.id) {
      <div class="flex items-center justify-between bg-white p-6 rounded-3xl shadow">
        <div class="flex items-center gap-4">
          <span class="text-4xl">{{ t.category?.icon || '💰' }}</span>
          <div>
            <p class="font-medium">{{ t.description }}</p>
            <p class="text-sm text-gray-500">{{ t.date | date:'short' }}</p>
          </div>
        </div>
        <div class="text-right">
          <p [ngClass]="t.transaction_type === 'expense' ? 'text-red-500 font-semibold text-2xl' : 'text-green-500 font-semibold text-2xl'">
            {{ t.transaction_type === 'expense' ? '-' : '+' }}${{ t.amount }}
          </p>
          <button (click)="deleteTransaction(t.id)" class="text-xs text-red-500 mt-1">Delete</button>
        </div>
      </div>
    }
  </div>

  @if (errorMessage) {
    <div class="mt-8 bg-red-100 p-4 rounded-2xl text-red-700">{{ errorMessage }}</div>
  }
</div>
